<!DOCTYPE html>  
<html>  
<head>  
  <meta charset="UTF-8">  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Sportlink-FIFA HUB Player</title>     
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FMP9REY96D"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FMP9REY96D');
  </script>
  <style>  
    * { margin: 0; padding: 0; box-sizing: border-box; }  
    html, body {  
      background: #000;  
      height: 100vh;  
      width: 100vw;  
      overflow: hidden;  
      font-family: system-ui, -apple-system, sans-serif;  
    }  
    .shaka-video-container {  
      position: absolute;  
      inset: 0;  
      width: 100%;  
      height: 100%;  
    }  
    video {  
      width: 100%;  
      height: 100%;  
      background: #000;  
      object-fit: contain;  
    }  
    .shaka-spinner-container,  
    .shaka-spinner,  
    .shaka-spinner-svg {  
      display: none !important;  
      visibility: hidden !important;  
      opacity: 0 !important;  
    }  
    #status-overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      pointer-events: none;
    }
  </style>  
</head>  
<body>  
  <div id="status-overlay">Initialising...</div>
  <a href="index.html" style="position:absolute; top:20px; left:20px; z-index:100; color:white; text-decoration:none; background:rgba(0,136,255,0.5); padding:10px 20px; border-radius:50px; font-weight:bold; backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.2);">
    <i class="fas fa-arrow-left mr-2"></i> BACK TO HUB
  </a>
  <div class="shaka-video-container" data-shaka-player>  
    <video autoplay playsinline preload="metadata" poster=""></video>  
  </div>  
  
  <script>  
    document.addEventListener('DOMContentLoaded', async () => {  
      shaka.polyfill.installAll();  
  
      if (!shaka.Player.isBrowserSupported()) {  
        console.error('Browser not supported');  
        document.getElementById('status-overlay').innerText = 'Browser not supported';
        return;  
      }  
  
      const video = document.querySelector('video');  
      const player = new shaka.Player();  
      await player.attach(video);  
  
      const container = document.querySelector('.shaka-video-container');  
      const ui = new shaka.ui.Overlay(player, container, video);  
  
      ui.configure({  
        controlPanelElements: [  
          'play_pause', 'time_and_duration', 'mute', 'volume',  
          'spacer', 'language', 'captions', 'picture_in_picture',  
          'quality', 'fullscreen'  
        ],  
        volumeBarColors: {  
          base: 'rgba(0, 136, 255, 0.3)',  
          level: 'rgb(0, 136, 255)'  
        },  
        seekBarColors: {  
          base: 'rgba(0, 136, 255, 0.3)',  
          buffered: 'rgba(0, 136, 255, 0.6)',  
          played: 'rgb(0, 136, 255)'  
        }
      });  
  
      // Get params from URL or use defaults
      const urlParams = new URLSearchParams(window.location.search);
      
      let drmConfig = { clearKeys: {} };
      let streamUrl = urlParams.get('url') || "https://a151aivottlinear-a.akamaihd.net/OTTB/sin-nitro/live/dash/enc/8m8cd46i1t/out/v1/83985c68e4174e90a58a1f2c024be4c9/cenc.mpd";
      
      const hexKeys = urlParams.get('hexKeys');
      if (hexKeys) {
        hexKeys.split(',').forEach(pair => {
          const [k, v] = pair.split(':');
          if (k && v) drmConfig.clearKeys[k.trim()] = v.trim();
        });
      } else {
        // Default demo keys
        drmConfig.clearKeys["0b42be2664d7e811d04f3e504e0924c5"] = "ae24090123b8c72ac5404dc152847cb8";
      }
  
      player.configure({  
        drm: drmConfig,  
        streaming: {  
          lowLatencyMode: true,  
          bufferingGoal: 20,  
          rebufferingGoal: 5,  
          bufferBehind: 30,  
          retryParameters: {  
            timeout: 30000,  
            maxAttempts: 5,  
            baseDelay: 1000,  
            backoffFactor: 2  
          }
        },  
        manifest: {  
          retryParameters: {  
            timeout: 30000,  
            maxAttempts: 5  
          }  
        }  
      });  
  
      const net = player.getNetworkingEngine();
      const PROXY = '/api/proxy?u=';
      
      // Prepare headers for proxy
      const headers = [
        'User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
        'Referer: https://www.plus.fifa.com/',
        'Origin: https://www.plus.fifa.com'
      ];
      const hParam = '&headers=' + encodeURIComponent(JSON.stringify(headers));

      net.registerRequestFilter((type, req) => {
        if (req.uris[0].startsWith('http') && !req.uris[0].includes(location.origin) && !req.uris[0].includes('/api/proxy')) {
          req.uris[0] = PROXY + encodeURIComponent(req.uris[0]) + hParam;
        }
      });
  
      player.addEventListener('error', (event) => {
        console.error('Shaka Player Error:', event.detail);
        document.getElementById('status-overlay').innerText = 'Error: ' + event.detail.code;
      });  
  
      try {  
        document.getElementById('status-overlay').innerText = 'Loading stream...';
        await player.load(streamUrl);  
        console.log("Stream loaded successfully");  
        document.getElementById('status-overlay').innerText = '';
        await video.play();
      } catch (error) {  
        console.error('Load error:', error);  
        document.getElementById('status-overlay').innerText = 'Load Error: ' + error.code;
      }  
    });  
  </script>  
</body>  
</html>
