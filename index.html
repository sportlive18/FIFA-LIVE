<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sportlink — FIFA Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --blue: #0066ff;
      --blue-glow: rgba(0,102,255,0.35);
      --red: #ff2d2d;
      --bg: #07090f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #f0f4ff;
      --muted: #6b7a99;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,102,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,102,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%; transform: translateX(-50%);
      width: 800px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,102,255,0.12) 0%, transparent 70%);
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }

    .wrap { max-width: 1300px; margin: 0 auto; padding: 0 24px 80px; position: relative; z-index: 1; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 0 60px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 48px;
    }

    .brand {
      display: flex; align-items: center; gap: 14px;
    }

    .brand-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, var(--blue), #003db3);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; box-shadow: 0 8px 24px var(--blue-glow);
    }

    .brand-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900; font-size: 1.7rem; letter-spacing: 1px;
      text-transform: uppercase;
    }

    .brand-name span { color: var(--blue); }

    .live-indicator {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,45,45,0.1); border: 1px solid rgba(255,45,45,0.3);
      padding: 8px 18px; border-radius: 50px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.85rem; letter-spacing: 2px;
      color: var(--red);
    }

    .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    /* ── Tabs ── */
    .tabs {
      display: flex; gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 4px;
      width: fit-content; margin-bottom: 40px;
    }

    .tab {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.9rem; letter-spacing: 1.5px;
      text-transform: uppercase; padding: 10px 24px;
      border-radius: 10px; cursor: pointer;
      color: var(--muted); transition: all 0.25s;
      border: none; background: none;
    }

    .tab.active {
      background: var(--blue); color: #fff;
      box-shadow: 0 4px 16px var(--blue-glow);
    }

    .tab:hover:not(.active) { color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px; overflow: hidden;
      transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
      display: flex; flex-direction: column;
      animation: fadeUp 0.5s both;
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(20px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(0,102,255,0.4);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px var(--blue-glow);
    }

    .card-thumb {
      position: relative; height: 195px; overflow: hidden;
      background: #0d1220;
    }

    .card-thumb img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s;
    }

    .card:hover .card-thumb img { transform: scale(1.08); }

    .card-thumb::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(7,9,15,0.8) 0%, transparent 60%);
    }

    .badge-live {
      position: absolute; top: 14px; left: 14px; z-index: 2;
      background: var(--red); color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 0.72rem; letter-spacing: 2px;
      padding: 4px 12px; border-radius: 50px;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 16px rgba(255,45,45,0.5);
    }

    .badge-upcoming {
      position: absolute; top: 14px; left: 14px; z-index: 2;
      background: rgba(0,0,0,0.6); color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.72rem; letter-spacing: 2px;
      padding: 4px 12px; border-radius: 50px;
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }

    .card-cat {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 0.72rem; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--blue); margin-bottom: 8px;
    }

    .card-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1.3rem; line-height: 1.25;
      margin-bottom: 12px;
    }

    .card-meta {
      font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 20px;
    }

    .card-meta i { color: var(--blue); font-size: 0.75rem; }

    .btn-watch {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      padding: 13px; border-radius: 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800; font-size: 1rem; letter-spacing: 1.5px;
      text-transform: uppercase; text-decoration: none;
      transition: all 0.25s; margin-top: auto;
      border: none; cursor: pointer;
    }

    .btn-watch.live {
      background: linear-gradient(135deg, var(--blue) 0%, #0044cc 100%);
      color: #fff;
      box-shadow: 0 6px 20px var(--blue-glow);
    }

    .btn-watch.live:hover {
      filter: brightness(1.15);
      box-shadow: 0 10px 30px var(--blue-glow);
      transform: scale(1.02);
    }

    .btn-watch.upcoming {
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      border: 1px solid var(--border);
      cursor: default; pointer-events: none;
    }

    /* ── States ── */
    .state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 0; text-align: center; gap: 16px;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state p { color: var(--muted); font-size: 0.9rem; }

    .hidden { display: none !important; }

    footer {
      text-align: center; margin-top: 60px;
      color: var(--muted); font-size: 0.78rem;
      border-top: 1px solid var(--border); padding-top: 30px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="brand-icon"><i class="fas fa-futbol"></i></div>
      <div class="brand-name">Sport<span>link</span> FIFA Hub</div>
    </div>
    <div class="live-indicator">
      <div class="pulse-dot"></div> LIVE NOW
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('all')" id="tab-all">All</button>
    <button class="tab" onclick="switchTab('live')" id="tab-live">Live</button>
    <button class="tab" onclick="switchTab('upcoming')" id="tab-upcoming">Upcoming</button>
  </div>

  <div id="state-loading" class="state">
    <div class="spinner"></div>
    <p>Loading matches...</p>
  </div>

  <div id="state-error" class="state hidden">
    <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#ff6b6b;"></i>
    <p id="error-msg">Failed to load match data.</p>
  </div>

  <div id="state-empty" class="state hidden">
    <i class="fas fa-calendar-times" style="font-size:2rem;color:var(--muted);"></i>
    <p>No matches in this category right now.</p>
  </div>

  <div id="grid" class="grid hidden"></div>

  <footer>
    <p>&copy; 2026 Sportlink FIFA Hub &mdash; Premium Football Streaming</p>
    <p id="last-updated" style="margin-top:6px;opacity:0.5;"></p>
  </footer>
</div>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/srhady/fifaplus/refs/heads/main/match_data.json';
  const PLAYER  = 'player.html';

  let matches = [];
  let tab = 'all';

  async function load() {
    try {
      const res  = await fetch(DATA_URL + '?_=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      matches = data.matches || [];
      const lu = data.metadata?.last_update_time;
      if (lu) document.getElementById('last-updated').textContent = 'Last updated: ' + lu;
      render();
      show('grid');
    } catch(e) {
      document.getElementById('error-msg').textContent = 'Failed to load: ' + e.message;
      show('state-error');
    }
  }

  function show(id) {
    ['state-loading','state-error','state-empty','grid'].forEach(x => {
      document.getElementById(x).classList.toggle('hidden', x !== id);
    });
  }

  function switchTab(t) {
    tab = t;
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + t).classList.add('active');
    render();
  }

  function render() {
    let list = matches;
    if (tab === 'live')     list = matches.filter(m => m.status === 'live' || m.status === 'started');
    if (tab === 'upcoming') list = matches.filter(m => m.status === 'upcoming');

    if (!list.length) { show('state-empty'); return; }
    show('grid');

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    list.forEach((m, i) => {
      const el = buildCard(m);
      el.style.animationDelay = (i * 0.06) + 's';
      grid.appendChild(el);
    });
  }

  function buildCard(m) {
    const isLive = m.status === 'live' || m.status === 'started';
    const thumb  = m.wideCoverUrl || m.backdropUri || '';
    const title  = m.title || 'Football Match';
    const cat    = m.category || 'Football';
    const start  = m.startDate ? new Date(m.startDate).toLocaleString() : '';

    // Build player URL — only for live matches with stream data
    let href = null;
    if (isLive && m.stream_data?.mpd_link) {
      const params = new URLSearchParams({
        url: m.stream_data.mpd_link,
        title: title,
      });
      if (m.stream_data.decryption_keys?.length) {
        params.set('keys', m.stream_data.decryption_keys.join(','));
      }
      href = PLAYER + '?' + params.toString();
    }

    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-thumb">
        <img
          src="${thumb || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22450%22><rect fill=%22%230d1220%22 width=%22800%22 height=%22450%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23334%22 font-size=%2240%22 text-anchor=%22middle%22 dy=%22.35em%22>⚽</text></svg>'}"
          alt="${title}"
          loading="lazy"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22450%22><rect fill=%22%230d1220%22 width=%22800%22 height=%22450%22/><text x=%2250%25%22 y=%2250%25%22 fill=%22%23334%22 font-size=%2240%22 text-anchor=%22middle%22 dy=%22.35em%22>⚽</text></svg>'"
        >
        ${isLive
          ? '<div class="badge-live"><span style="width:6px;height:6px;border-radius:50%;background:#fff;display:inline-block;"></span> LIVE</div>'
          : '<div class="badge-upcoming">UPCOMING</div>'
        }
      </div>
      <div class="card-body">
        <div class="card-cat">${cat}</div>
        <div class="card-title">${title}</div>
        ${start ? `<div class="card-meta"><i class="far fa-clock"></i> ${start}</div>` : ''}
        ${href
          ? `<a href="${href}" class="btn-watch live"><i class="fas fa-play"></i> WATCH LIVE</a>`
          : `<div class="btn-watch upcoming"><i class="fas fa-${isLive ? 'signal' : 'clock'}"></i> ${isLive ? 'STREAM UNAVAILABLE' : 'UPCOMING'}</div>`
        }
      </div>`;
    return div;
  }

  load();
  setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
