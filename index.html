<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA Plus Live | Sportlink</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0088ff;
      --primary-glow: rgba(0, 136, 255, 0.5);
      --bg-dark: #020617;
      --card-bg: rgba(15, 23, 42, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(0, 136, 255, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 136, 255, 0.1) 0%, transparent 40%);
    }
    .bg-glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
    }
    .glow-sphere {
      position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 136, 255, 0.1) 0%, transparent 70%);
      filter: blur(80px); animation: float 20s infinite alternate ease-in-out;
    }
    @keyframes float { 0% { transform: translate(-10%, -10%) scale(1); } 100% { transform: translate(20%, 20%) scale(1.2); } }
    
    .container-custom { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem 5rem; }
    
    .premium-header { text-align: center; margin-bottom: 4rem; position: relative; }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 1rem; background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px); padding: 1rem 3rem; border-radius: 100px;
      border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .logo-text {
      font-size: 2.5rem; font-weight: 900; letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    
    .section-tabs { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; flex-wrap: wrap; }
    .tab-btn {
      padding: 0.8rem 2rem; border-radius: 50px; font-weight: 600; cursor: pointer; transition: all 0.3s;
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: var(--text-muted);
    }
    .tab-btn.active {
      background: var(--primary); color: #fff; border-color: var(--primary);
      box-shadow: 0 10px 20px var(--primary-glow);
    }
    
    .match-card {
      background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      display: flex; flex-direction: column; height: 100%;
    }
    .match-card:hover {
      transform: translateY(-10px) scale(1.02); border-color: rgba(0, 136, 255, 0.4);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 136, 255, 0.1);
    }
    .card-image { position: relative; height: 200px; overflow: hidden; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .match-card:hover .card-image img { transform: scale(1.1); }
    
    .live-tag {
      position: absolute; top: 1rem; left: 1rem; background: #ef4444; padding: 0.4rem 1rem;
      border-radius: 50px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;
      display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
      z-index: 10; animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); }
    }
    
    .card-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    .match-category { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--primary); font-weight: 700; margin-bottom: 0.5rem; }
    .match-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.3; }
    .match-meta { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.85rem; flex-wrap: wrap; }
    
    .watch-btn {
      width: 100%; padding: 1rem; border-radius: 1rem;
      background: linear-gradient(135deg, var(--primary), #1d4ed8); color: #fff; font-weight: 700;
      text-align: center; transition: all 0.3s; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.1); margin-top: auto;
    }
    .watch-btn:hover { transform: scale(1.02); box-shadow: 0 15px 30px rgba(0, 136, 255, 0.4); filter: brightness(1.1); }
    
    .loader {
      width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
      border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
    }
    @keyframes rotation { 100% { transform: rotate(360deg); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .grid-item { animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
    
    .footer-info { margin-top: 5rem; text-align: center; color: var(--text-muted); font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="bg-glow"><div class="glow-sphere"></div></div>

<div class="container-custom">
  <header class="premium-header">
    <div class="logo-badge">
      <i class="fas fa-futbol text-blue-500 text-3xl"></i>
      <h1 class="logo-text">Sportlink-FIFA HUB</h1>
    </div>
    <p class="text-blue-400 font-bold tracking-[0.4rem] mt-6 text-xs uppercase">Premium Football Events</p>
    <div class="mt-8 flex justify-center">
      <a href="fifa-play.html" class="tab-btn active">
        <i class="fas fa-play-circle mr-2"></i> LAUNCH DEMO PLAYER
      </a>
    </div>
  </header>

  <div class="section-tabs">
    <div id="tab-all" class="tab-btn active" onclick="switchTab('all')">ALL MATCHES</div>
    <div id="tab-live" class="tab-btn" onclick="switchTab('live')">LIVE</div>
    <div id="tab-upcoming" class="tab-btn" onclick="switchTab('upcoming')">UPCOMING</div>
  </div>

  <div id="loading" class="flex justify-center items-center py-20">
    <span class="loader"></span>
  </div>

  <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

  <div id="no-matches" class="hidden text-center py-20 text-gray-500 italic">
    No matches found in this category.
  </div>

  <footer class="footer-info">
    <p>&copy; 2026 FIFA PLUS HUB | Sportlink Premium. All Rights Reserved.</p>
    <p class="mt-2 opacity-50" id="last-updated"></p>
  </footer>
</div>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/srhady/fifaplus/refs/heads/main/match_data.json';
  const PLAYER_URL = 'fifa-play.html';

  let allMatches = [];
  let activeTab = 'all';

  async function fetchData() {
    try {
      const r = await fetch(DATA_URL + '?_=' + Date.now());
      const data = await r.json();
      allMatches = data.matches || [];
      document.getElementById('last-updated').innerText = 
        `Last Updated: ${data.metadata?.last_update_time || 'Just now'}`;
      renderMatches();
      document.getElementById('loading').classList.add('hidden');
    } catch (err) {
      console.error(err);
      document.getElementById('loading').innerHTML = 
        '<p class="text-red-500">Failed to load FIFA match data.</p>';
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    renderMatches();
  }

  function renderMatches() {
    const grid = document.getElementById('matches-grid');
    const noMatches = document.getElementById('no-matches');
    
    let filtered = allMatches;
    if (activeTab === 'live') filtered = allMatches.filter(m => m.status === 'live');
    if (activeTab === 'upcoming') filtered = allMatches.filter(m => m.status === 'upcoming');

    grid.innerHTML = '';
    if (!filtered.length) {
      noMatches.classList.remove('hidden');
    } else {
      noMatches.classList.add('hidden');
      filtered.forEach((m, i) => grid.appendChild(createCard(m, i)));
    }
  }

  function createCard(match, index) {
    const wrap = document.createElement('div');
    wrap.className = 'grid-item';
    wrap.style.animationDelay = `${index * 0.05}s`;

    const thumb = match.wideCoverUrl || match.backdropUri || 'https://via.placeholder.com/800x450?text=FIFA+PLUS';
    const title = match.title || 'Football Match';
    const start = new Date(match.startDate).toLocaleString();
    const isLive = match.status === 'live';
    const category = match.category || 'Football';

    // In a real app, we would have a way to resolve the match ID to a stream URL.
    // For this demo, we'll use the user-provided demo stream.
    const playerHref = `${PLAYER_URL}?id=${match.id}`;

    wrap.innerHTML = `
      <div class="match-card">
        <div class="card-image">
          <img src="${thumb}" alt="${title}" onerror="this.src='https://via.placeholder.com/800x450?text=FIFA+PLUS'">
          ${isLive ? '<div class="live-tag"><span class="w-2 h-2 bg-white rounded-full"></span>Live</div>' : ''}
        </div>
        <div class="card-content">
          <div class="match-category">${category}</div>
          <h3 class="match-title">${title}</h3>
          <div class="match-meta">
            <span><i class="far fa-calendar-alt mr-2"></i>${start}</span>
          </div>
          <a href="${playerHref}" class="watch-btn">
            <i class="fas ${isLive ? 'fa-play' : 'fa-info-circle'}"></i> 
            ${isLive ? 'WATCH LIVE' : 'MATCH DETAILS'}
          </a>
        </div>
      </div>`;
    return wrap;
  }

  fetchData();
  setInterval(fetchData, 300000); // Refresh every 5 mins
</script>
</body>
</html>
