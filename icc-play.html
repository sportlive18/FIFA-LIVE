<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICC Player</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#000;width:100%;height:100%;font-family:system-ui,sans-serif;overflow:hidden}
    .video-container{position:absolute;width:100%;height:100%}
    .shaka-video-container{position:absolute;width:100%;height:100%}
    video{width:100%;height:100%;background:#000}

    #status{
      position:absolute;top:0;left:0;right:0;z-index:6000;
      background:rgba(0,0,0,.88);color:#94a3b8;font-size:12px;
      padding:8px 12px;line-height:1.9;max-height:55vh;overflow-y:auto;
    }
    #status.hidden{display:none}
    .ok {color:#4ade80} .err{color:#f87171} .inf{color:#60a5fa} .warn{color:#fbbf24}

    #unmute-btn{
      display:none;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
      z-index:3000;background:rgba(0,0,0,.8);color:#fff;
      border:2px solid rgba(255,255,255,.4);padding:.6rem 1.6rem;
      border-radius:50px;cursor:pointer;font-size:1rem;font-weight:700
    }
    .shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{display:none!important}
    .shaka-played-range  {background:rgb(59,130,246)!important}
    .shaka-buffered-range{background:rgba(255,255,255,.4)!important}
    .shaka-seek-bar      {background:rgba(255,255,255,.2)!important}
  </style>
</head>
<body>

<div id="status"><span class="inf">⏳ Initialising…</span></div>
<button id="unmute-btn" onclick="video.muted=false;video.volume=1;this.style.display='none'">🔊 Tap to Unmute</button>

<div class="video-container">
  <div class="shaka-video-container" id="shaka-container">
    <video id="video" autoplay muted playsinline preload="auto"></video>
  </div>
</div>

<script>
const PROXY = '/api/proxy?u=';
const video = document.getElementById('video');
const statusEl = document.getElementById('status');
let player;

function log(msg, cls='inf') {
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = msg;
  statusEl.appendChild(d);
  statusEl.scrollTop = statusEl.scrollHeight;
  console.log('[ICC]', msg);
}

function b64ToHex(s) {
  let b = s.replace(/-/g,'+').replace(/_/g,'/');
  while (b.length%4) b+='=';
  return Array.from(atob(b)).map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
}

async function init() {
  const p   = new URLSearchParams(location.search);
  const url = p.get('url');
  const jwk = p.get('keys');
  const hex = p.get('hexKeys');
  const hdr = p.get('headers');

  if (!url) { log('❌ No ?url= param','err'); return; }
  log('Stream: ' + url.substring(0,80)+'…');

  // Headers
  const fwd = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:150.0) Gecko/20100101 Firefox/150.0',
    'Referer':    'https://www.icc-cricket.com/',
    'Origin':     'https://www.icc-cricket.com'
  };
  if (hdr) {
    try { JSON.parse(decodeURIComponent(hdr)).forEach(h=>{const i=h.indexOf(': ');if(i>-1)fwd[h.slice(0,i)]=h.slice(i+2);}); }
    catch(e){ log('Header parse err: '+e,'warn'); }
  }
  const hParam = encodeURIComponent(JSON.stringify(Object.entries(fwd).map(([k,v])=>`${k}: ${v}`)));

  // ClearKey
  const clearKeys = {};
  if (jwk) {
    try {
      const obj=JSON.parse(jwk), arr=obj.keys||(Array.isArray(obj)?obj:[]);
      arr.forEach(k=>{clearKeys[b64ToHex(k.kid)]=b64ToHex(k.k);});
      log('ClearKey (JWK) ✓','ok');
    } catch(e){ log('JWK err: '+e,'err'); }
  } else if (hex) {
    decodeURIComponent(hex).split(',').forEach(pr=>{const[k,v]=pr.split(':');if(k&&v)clearKeys[k.trim()]=v.trim();});
    log('ClearKey (hex) ✓','ok');
  }

  if (player) { try{await player.destroy();}catch(_){} player=null; }

  // Pass video to constructor — synchronous attach, no black frame
  player = new shaka.Player(video);

  player.addEventListener('error', e => {
    log(`Shaka ${e.detail.code}: ${e.detail.message||JSON.stringify(e.detail)}`, 'err');
  });

  video.addEventListener('canplay', ()=>{
    log('▶ canplay — stream is live!','ok');
    setTimeout(()=>statusEl.classList.add('hidden'), 2000);
  }, {once:true});

  // UI
  new shaka.ui.Overlay(player, document.getElementById('shaka-container'), video).configure({
    seekBarColors:{base:'rgba(255,255,255,.2)',buffered:'rgba(255,255,255,.4)',played:'rgb(59,130,246)'},
    controlPanelElements:['play_pause','mute','volume','time_and_duration','spacer',
      'quality','language','picture_in_picture','fullscreen','overflow_menu']
  });

  // ── Network filter ────────────────────────────────────────────────
  // The proxy now rewrites ALL URLs inside the MPD text,
  // so Shaka only ever sees already-proxied URLs.
  // The request filter here is a safety net for any URL Shaka
  // constructs itself (e.g. from SegmentTemplate with relative paths).
  const net = player.getNetworkingEngine();

  net.registerRequestFilter((type, req) => {
    req.uris = req.uris.map(uri => {
      // Only proxy if it's a raw CDN URL (not already proxied)
      if (uri.startsWith('http') &&
          !uri.includes(location.origin) &&
          !uri.includes('/api/proxy')) {
        log('Intercepted raw CDN url (type='+type+'): '+uri.substring(0,60), 'warn');
        return PROXY + encodeURIComponent(uri) + '&headers=' + hParam;
      }
      return uri;
    });
  });

  // NO response filter — the proxy handles everything in MPD text itself

  // Config
  const cfg = {
    streaming:{ bufferingGoal:20, rebufferingGoal:5, bufferBehind:30,
      retryParameters:{timeout:30000,maxAttempts:5,baseDelay:1000,backoffFactor:2,fuzzFactor:.5} },
    manifest:{ retryParameters:{timeout:30000,maxAttempts:5,baseDelay:1000,backoffFactor:2,fuzzFactor:.5} }
  };
  if (Object.keys(clearKeys).length) {
    cfg.drm = { clearKeys };
    log('DRM configured','ok');
  }
  player.configure(cfg);

  // Load
  try {
    const manifestUrl = PROXY + encodeURIComponent(url) + '&headers=' + hParam;
    log('Loading manifest via proxy…');
    await player.load(manifestUrl);
    log('load() ✓','ok');

    await video.play();
    log('play() ✓','ok');

    setTimeout(()=>{
      video.muted=false; video.volume=1;
      if(video.muted) document.getElementById('unmute-btn').style.display='block';
    }, 500);

  } catch(err) {
    log(`Load failed: code=${err.code||'?'} — ${err.message||''}`, 'err');
  }
}

document.addEventListener('DOMContentLoaded', ()=>init().catch(e=>log('Fatal: '+e.message,'err')));
</script>
</body>
</html>
