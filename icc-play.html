<script>

    let player;
    const video = document.getElementById('video');
    const PROXY_BASE = '/api/proxy?u=';

    // Helper to convert base64url to hex string
    function base64ToHex(base64url) {
      const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
      const raw = atob(base64);
      let result = '';
      for (let i = 0; i < raw.length; i++) {
        const hex = raw.charCodeAt(i).toString(16);
        result += (hex.length === 2 ? hex : '0' + hex);
      }
      return result;
    }

    async function initializePlayer() {
      try {
        const queryParams = new URLSearchParams(window.location.search);
        const streamUrl = queryParams.get('url');
        const jwkKeys = queryParams.get('keys');
        const hexKeys = queryParams.get('hexKeys');

        if (!streamUrl) {
          console.error("No stream URL provided");
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#fff;font-size:1.2rem;">No stream URL provided</div>';
          return;
        }

        console.log("Stream URL:", streamUrl);

        player = new shaka.Player();
        await player.attach(video);

        // Error listener
        player.addEventListener('error', (event) => {
          console.error('Shaka Error:', event.detail);
        });

        // UI Configuration
        const container = document.querySelector('.shaka-video-container');
        const ui = new shaka.ui.Overlay(player, container, video);
        
        const uiConfig = {
          'seekBarColors': {
            base: 'rgba(255,255,255,.2)',
            buffered: 'rgba(255,255,255,.4)',
            played: 'rgb(59, 130, 246)',
          },
          'controlPanelElements': [
            'play_pause',
            'mute',
            'volume',
            'time_and_duration',
            'spacer',
            'quality',
            'language',
            'picture_in_picture',
            'fullscreen',
            'overflow_menu'
          ]
        };
        ui.configure(uiConfig);

        // DRM Configuration (ClearKey)
        const clearKeys = {};
        
        if (jwkKeys) {
          try {
            const parsedJwk = JSON.parse(decodeURIComponent(jwkKeys));
            if (parsedJwk.keys) {
              parsedJwk.keys.forEach(keyObj => {
                const kid = base64ToHex(keyObj.kid);
                const key = base64ToHex(keyObj.k);
                clearKeys[kid] = key;
                console.log(`ClearKey KID: ${kid}, KEY: ${key}`);
              });
            }
          } catch (e) {
            console.error("Error parsing JWK keys:", e);
          }
        } else if (hexKeys) {
          const pairs = decodeURIComponent(hexKeys).split(',');
          pairs.forEach(pair => {
            const [kid, key] = pair.split(':');
            if (kid && key) {
              clearKeys[kid.trim()] = key.trim();
              console.log(`ClearKey HEX KID: ${kid.trim()}, KEY: ${key.trim()}`);
            }
          });
        }

        // Compute original base URL for resolving relative paths in DASH manifest
        const originalBaseUrl = streamUrl.substring(0, streamUrl.lastIndexOf('/') + 1);
        const originalOrigin = new URL(streamUrl).origin;

        // Register network request filter - routes ALL requests through proxy
        player.getNetworkingEngine().registerRequestFilter(function(type, request) {
          request.uris = request.uris.map(uri => {
            // If already proxied, skip
            if (uri.includes('/api/proxy')) return uri;
            // If it's an absolute URL, proxy it
            if (uri.startsWith('http://') || uri.startsWith('https://')) {
              return PROXY_BASE + encodeURIComponent(uri);
            }
            // Relative URL — resolve against original CDN base URL, then proxy
            let absoluteUrl;
            if (uri.startsWith('/')) {
              // Absolute path relative to origin
              absoluteUrl = originalOrigin + uri;
            } else {
              // Relative path — resolve against manifest base directory
              absoluteUrl = originalBaseUrl + uri;
            }
            console.log('Proxying relative URL:', uri, '->', absoluteUrl);
            return PROXY_BASE + encodeURIComponent(absoluteUrl);
          });
        });

        // Apply player configurations
        const hasClearKeys = Object.keys(clearKeys).length > 0;
        const playerConfig = {
          streaming: {
            bufferingGoal: 20,
            rebufferingGoal: 5,
            bufferBehind: 30,
            retryParameters: {
              timeout: 30000,
              maxAttempts: 5,
              baseDelay: 1000,
              backoffFactor: 2,
              fuzzFactor: 0.5
            }
          },
          manifest: {
            retryParameters: {
              timeout: 30000,
              maxAttempts: 5,
              baseDelay: 1000,
              backoffFactor: 2,
              fuzzFactor: 0.5
            }
          }
        };

        if (hasClearKeys) {
          playerConfig.drm = { clearKeys: clearKeys };
          console.log("ClearKey DRM configured:", clearKeys);
        }

        player.configure(playerConfig);

        // Load the manifest — proxy the initial manifest URL
        const manifestUrl = PROXY_BASE + encodeURIComponent(streamUrl);
        console.log("Loading manifest via proxy:", manifestUrl);
        
        await player.load(manifestUrl);
        console.log("Stream loaded successfully!");

        // Autoplay handling
        video.muted = true;
        try {
          await video.play();
          console.log("Autoplay (muted) successful");
          // Try unmuting after a short delay
          setTimeout(() => {
            video.muted = false;
            console.log("Audio unmuted");
          }, 500);
        } catch (playError) {
          console.log("Autoplay failed, waiting for user interaction:", playError);
        }

      } catch (error) {
        console.error('Player initialization error:', error);
        if (error.code) {
          console.error('Shaka error code:', error.code, 'Category:', error.category);
        }
      }
    }

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      initializePlayer().catch(error => {
        console.error('Fatal player error:', error);
      });
    });

    // Show popup after delay
    setTimeout(() => { 
      document.getElementById('whatsappPopup').style.display = 'block'; 
    }, 3000);
</script>
