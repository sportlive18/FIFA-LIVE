<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ICC Player | Premium Live</title>
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/shaka-player.ui.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.6.0/controls.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{background:#000;width:100%;height:100%;font-family:system-ui,sans-serif;overflow:hidden}
    .video-container{position:absolute;width:100%;height:100%;background:#000}
    .shaka-video-container{position:absolute;width:100%;height:100%}
    video{width:100%;height:100%;background:#000}

    #error-overlay{
      display:none;position:absolute;inset:0;z-index:5000;
      background:rgba(0,0,0,.85);backdrop-filter:blur(6px);
      flex-direction:column;align-items:center;justify-content:center;gap:1rem;color:#fff;
    }
    #error-overlay.show{display:flex}
    #error-overlay h2{font-size:1.2rem;color:#ef4444}
    #error-overlay p{font-size:.85rem;color:#94a3b8;max-width:420px;text-align:center}
    #retry-btn{
      margin-top:.5rem;padding:.7rem 2rem;border-radius:50px;background:#3b82f6;
      color:#fff;border:none;cursor:pointer;font-weight:700;font-size:1rem
    }
    #retry-btn:hover{background:#2563eb}

    #loading-overlay{
      display:flex;position:absolute;inset:0;z-index:4000;
      background:#000;align-items:center;justify-content:center;
    }
    .spinner{width:52px;height:52px;border:5px solid #1e3a5f;border-top-color:#3b82f6;
      border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Unmute button shown when browser forces muted autoplay */
    #unmute-btn{
      display:none;position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
      z-index:3000;background:rgba(0,0,0,.75);color:#fff;border:2px solid rgba(255,255,255,.4);
      padding:.6rem 1.6rem;border-radius:50px;cursor:pointer;font-size:1rem;font-weight:700;
      backdrop-filter:blur(4px);transition:background .2s;
    }
    #unmute-btn:hover{background:rgba(59,130,246,.8);border-color:#3b82f6}

    .shaka-played-range{background:rgb(59,130,246)!important}
    .shaka-buffered-range{background:rgba(255,255,255,.4)!important}
    .shaka-seek-bar{background:rgba(255,255,255,.2)!important}
    .shaka-spinner-container,.shaka-spinner,.shaka-spinner-svg{
      display:none!important;visibility:hidden!important;opacity:0!important}

    .wa-popup{
      display:none;position:fixed;inset:0;z-index:10000;
      align-items:center;justify-content:center;background:rgba(0,0,0,.5)
    }
    .wa-popup.show{display:flex}
    .wa-card{
      background:rgba(255,255,255,.97);border-radius:20px;padding:2.5rem 2rem;
      width:90%;max-width:400px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.3);
      animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) forwards
    }
    @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .wa-card h2{color:#1e293b;font-size:1.4rem;margin-bottom:.4rem}
    .wa-card p{color:#64748b;font-size:.9rem;margin-bottom:1.2rem;line-height:1.6}
    .wa-btn{
      display:block;width:100%;padding:.9rem;border-radius:12px;font-weight:700;
      font-size:1rem;cursor:pointer;border:none;text-decoration:none;
      margin-top:.6rem;transition:transform .2s
    }
    .wa-btn:hover{transform:translateY(-2px)}
    .join{background:#25D366;color:#fff;box-shadow:0 4px 15px rgba(37,211,102,.3)}
    .skip{background:transparent;color:#64748b;border:1px solid rgba(0,0,0,.15)}
  </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>

<div id="error-overlay">
  <h2>⚠️ Stream Error</h2>
  <p id="error-msg">Could not load the stream.</p>
  <button id="retry-btn">↺ Retry</button>
</div>

<button id="unmute-btn">🔊 Tap to Unmute</button>

<div class="video-container">
  <div class="shaka-video-container" id="shaka-container">
    <!-- muted + playsinline are REQUIRED for autoplay to work in browsers -->
    <video id="video" autoplay muted playsinline preload="auto"></video>
  </div>
</div>

<div class="wa-popup" id="waPopup">
  <div class="wa-card">
    <h2>📱 Join Our Channel</h2>
    <p>Get instant updates, match highlights, and exclusive links on our official WhatsApp channel.</p>
    <a href="https://whatsapp.com/channel/0029VbC2oQsC6ZvmwpR3v73v"
       target="_blank" rel="noopener" class="wa-btn join">Follow on WhatsApp</a>
    <button class="wa-btn skip"
            onclick="document.getElementById('waPopup').classList.remove('show')">
      Already Following
    </button>
  </div>
</div>

<script>
  const PROXY_BASE  = '/api/proxy?u=';
  const video       = document.getElementById('video');
  const unmuteBtn   = document.getElementById('unmute-btn');
  let   player;

  function b64ToHex(b64url) {
    let b64 = b64url.replace(/-/g,'+').replace(/_/g,'/');
    while (b64.length % 4) b64 += '=';
    const raw = atob(b64);
    return Array.from(raw).map(c => c.charCodeAt(0).toString(16).padStart(2,'0')).join('');
  }

  function showError(msg) {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-overlay').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loading-overlay').style.display = 'none';
  }

  // Unmute button — shown when browser only allows muted autoplay
  unmuteBtn.addEventListener('click', () => {
    video.muted  = false;
    video.volume = 1;
    unmuteBtn.style.display = 'none';
  });

  async function initPlayer() {
    document.getElementById('error-overlay').classList.remove('show');
    document.getElementById('loading-overlay').style.display = 'flex';
    unmuteBtn.style.display = 'none';

    const params     = new URLSearchParams(location.search);
    const streamUrl  = params.get('url');
    const jwkKeys    = params.get('keys');
    const hexKeys    = params.get('hexKeys');
    const rawHeaders = params.get('headers');

    if (!streamUrl) { showError('No stream URL provided.'); return; }

    // Clean up previous player
    if (player) {
      try { await player.destroy(); } catch(_) {}
      player = null;
    }

    // Pass video element directly to constructor — this is the key fix for black screen.
    // new shaka.Player(video) attaches synchronously before any async work happens,
    // so Shaka owns the element from the very first frame of decoded video.
    player = new shaka.Player(video);

    player.addEventListener('error', e => {
      console.error('Shaka error:', e.detail);
      showError(`Error ${e.detail.code}: stream failed or geo-blocked`);
    });

    // Hide spinner on first decoded frame, not just on load() resolving
    video.addEventListener('canplay', hideLoading, { once: true });

    // Build Shaka UI (controls bar)
    const ui = new shaka.ui.Overlay(
      player,
      document.getElementById('shaka-container'),
      video
    );
    ui.configure({
      seekBarColors: {
        base:     'rgba(255,255,255,.2)',
        buffered: 'rgba(255,255,255,.4)',
        played:   'rgb(59,130,246)',
      },
      controlPanelElements: [
        'play_pause','mute','volume','time_and_duration','spacer',
        'quality','language','picture_in_picture','fullscreen','overflow_menu'
      ]
    });

    // ── ClearKey DRM ────────────────────────────────────────────────────
    const clearKeys = {};
    if (jwkKeys) {
      try {
        const jwk = JSON.parse(jwkKeys);
        const arr = jwk.keys || (Array.isArray(jwk) ? jwk : []);
        arr.forEach(k => { clearKeys[b64ToHex(k.kid)] = b64ToHex(k.k); });
      } catch(e) { console.warn('JWK parse error:', e); }
    } else if (hexKeys) {
      decodeURIComponent(hexKeys).split(',').forEach(pair => {
        const [kid, key] = pair.split(':');
        if (kid && key) clearKeys[kid.trim()] = key.trim();
      });
    }

    // ── Headers (from JSON playback.headers) ───────────────────────────
    const fwdHeaders = {};
    if (rawHeaders) {
      try {
        JSON.parse(decodeURIComponent(rawHeaders)).forEach(h => {
          const i = h.indexOf(': ');
          if (i > -1) fwdHeaders[h.substring(0,i)] = h.substring(i+2);
        });
      } catch(_) {}
    }
    if (!fwdHeaders['User-Agent'])
      fwdHeaders['User-Agent'] = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:150.0) Gecko/20100101 Firefox/150.0';
    if (!fwdHeaders['Referer']) fwdHeaders['Referer'] = 'https://www.icc-cricket.com/';
    if (!fwdHeaders['Origin'])  fwdHeaders['Origin']  = 'https://www.icc-cricket.com';

    const headersJson = encodeURIComponent(
      JSON.stringify(Object.entries(fwdHeaders).map(([k,v]) => `${k}: ${v}`))
    );

    // ── Network filters ─────────────────────────────────────────────────
    const net = player.getNetworkingEngine();

    net.registerRequestFilter((type, req) => {
      req.uris = req.uris.map(uri => {
        if (uri.startsWith('http') &&
            !uri.includes(location.origin) &&
            !uri.includes('/api/proxy')) {
          return `${PROXY_BASE}${encodeURIComponent(uri)}&headers=${headersJson}`;
        }
        return uri;
      });
    });

    net.registerResponseFilter((type, resp) => {
      if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
        try {
          const orig = new URL(resp.uri, location.href).searchParams.get('u');
          if (orig) resp.uri = orig;
        } catch(_) { resp.uri = streamUrl; }
      }
    });

    // ── Configure ───────────────────────────────────────────────────────
    const cfg = {
      streaming: {
        bufferingGoal: 20, rebufferingGoal: 5, bufferBehind: 30,
        retryParameters: { timeout:30000, maxAttempts:5, baseDelay:1000, backoffFactor:2, fuzzFactor:.5 }
      },
      manifest: {
        retryParameters: { timeout:30000, maxAttempts:5, baseDelay:1000, backoffFactor:2, fuzzFactor:.5 }
      }
    };
    if (Object.keys(clearKeys).length) {
      cfg.drm = { clearKeys };
      console.log('ClearKey DRM configured:', clearKeys);
    }
    player.configure(cfg);

    // ── Load & play ─────────────────────────────────────────────────────
    try {
      const manifestUrl = `${PROXY_BASE}${encodeURIComponent(streamUrl)}&headers=${headersJson}`;
      await player.load(manifestUrl);
      console.log('Stream loaded ✓');

      // video is already muted (HTML attr) so play() will succeed in all browsers.
      // After play starts we try to unmute; if browser blocks it, show the unmute button.
      await video.play();

      // Small delay so the first frame renders before we unmute
      setTimeout(() => {
        video.muted  = false;
        video.volume = 1;
        // If browser reverted to muted, show the tap-to-unmute button
        if (video.muted) unmuteBtn.style.display = 'block';
      }, 800);

    } catch(err) {
      console.error('Load error:', err);
      showError(`Failed to load (code ${err.code || '?'}). Token may be expired or stream is geo-blocked.`);
    }
  }

  document.getElementById('retry-btn').addEventListener('click', initPlayer);
  document.addEventListener('DOMContentLoaded', () => initPlayer().catch(e => showError(e.message)));

  setTimeout(() => document.getElementById('waPopup').classList.add('show'), 5000);
</script>
</body>
</html>
